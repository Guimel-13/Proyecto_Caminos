<div id="modalNuevaGestion" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[150] hidden flex items-center justify-center p-4 transition-opacity">
    <div class="bg-[#151C2C] w-full max-w-sm rounded-2xl border border-slate-700 flex flex-col shadow-2xl transform scale-95 opacity-0 transition-all duration-300" id="modalNuevaGestionContent">
        
        <div class="p-6 border-b border-slate-700/50 bg-[#0B1120] rounded-t-2xl">
            <h3 class="text-white font-bold text-lg flex items-center gap-3">
                <i class="fas fa-calendar-plus text-accent"></i> Iniciar Nueva Gestión
            </h3>
        </div>
        
        <div class="p-6">
            <label class="block text-xs font-semibold text-slate-300 mb-2 text-center">Ingrese el Año de la Gestión</label>
            <input type="number" id="inputAnioGestion" class="w-full bg-[#0B1120] border border-slate-700/50 rounded-lg px-4 py-3 text-white font-bold text-center text-2xl outline-none focus:border-accent transition-colors" placeholder="Ej: 2026">
            <p id="errorGestion" class="text-red-400 text-xs mt-3 hidden text-center font-semibold bg-red-500/10 py-2 rounded border border-red-500/20"></p>
        </div>
        
        <div class="p-4 border-t border-slate-700/50 bg-[#0B1120] rounded-b-2xl flex justify-center gap-4">
            <button type="button" onclick="cerrarModalNuevaGestion()" class="px-6 py-2 rounded-lg text-slate-400 font-bold hover:text-white transition-colors text-sm">Cancelar</button>
            <button type="button" onclick="guardarNuevaGestionBD()" class="bg-accent hover:bg-accenthover text-white px-8 py-2 rounded-lg font-bold transition-all shadow-[0_0_15px_rgba(168,85,247,0.4)] text-sm">
                Crear Gestión
            </button>
        </div>
    </div>
</div>
