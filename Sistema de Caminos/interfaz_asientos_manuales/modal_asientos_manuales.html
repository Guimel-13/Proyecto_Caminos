<div id="modalAsientosManuales" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4 lg:p-8 transition-opacity">
    <div class="bg-[#151C2C] w-full max-w-6xl h-[90vh] rounded-2xl border border-slate-700 flex flex-col shadow-2xl transform scale-95 opacity-0 transition-all duration-300 max-h-full overflow-hidden" id="modalAsientosManualesContent">

        <div class="flex justify-between items-center p-6 border-b border-slate-700/50 bg-[#0B1120] flex-shrink-0">
            <h3 id="tituloFormularioAsientos" class="text-white font-bold text-xl flex items-center gap-3">
                <i class="fas fa-book text-accent"></i> Nuevo Asiento Manual
            </h3>
            <div class="flex items-center gap-4">
                <div class="bg-[#2D1B4E] border border-accent/20 px-4 py-1.5 rounded-lg flex items-center gap-3">
                    <span class="text-xs text-slate-300 uppercase font-semibold tracking-wider">Código:</span>
                    <span id="lblCodigoFormularioAsientos" class="text-accent font-black text-lg">AUTO</span>
                </div>
                <button type="button" onclick="cerrarModalAsientosManuales()" class="text-slate-400 hover:text-white transition-colors w-8 h-8 rounded-full bg-slate-800 hover:bg-red-500 flex items-center justify-center">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>

        <form onsubmit="event.preventDefault();" class="flex flex-col h-full overflow-hidden">
            <div class="p-6 overflow-y-auto scroll-custom flex-1">
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">

                    <input type="hidden" id="asientos_id_oculto" value="">
                    <input type="hidden" id="asientos_archivo_temporal" value="">

                    <div class="lg:col-span-2 space-y-6">
                        <div>
                            <h4 class="text-xs text-slate-500 uppercase font-bold tracking-widest mb-3">1. Datos Principales</h4>
                            <div class="grid grid-cols-1 gap-4">
                                <div>
                                    <label class="block text-xs font-semibold text-slate-300 mb-1">Detalle / Glosa</label>
                                    <textarea id="asientos_detalle_glosa" rows="3" class="w-full bg-[#0B1120] border border-slate-700/50 rounded-lg px-4 py-2.5 text-slate-200 outline-none focus:border-accent/50 transition-colors" placeholder="Ej: Ajuste contable por depreciación..."></textarea>
                                </div>
                            </div>
                        </div>

                        <div>
                            <h4 class="text-xs text-slate-500 uppercase font-bold tracking-widest mb-3">2. Datos del Documento</h4>
                            <div class="flex flex-col gap-4">
                                <div>
                                    <label class="block text-xs font-semibold text-slate-300 mb-1">N° de Documento</label>
                                    <input type="text" id="asientos_n_documento" class="w-full bg-[#0B1120] border border-slate-700/50 rounded-lg px-4 py-2.5 text-slate-200 outline-none focus:border-accent/50 transition-colors" placeholder="Ej: DOC-9941">
                                </div>
                                <div class="mt-2 border-t border-slate-700/50 pt-4">
                                    <label class="block text-xs font-semibold text-slate-300 mb-1">Importe Total (Bs.)</label>
                                    <input type="number" id="asientos_importe" step="0.01" class="w-full bg-[#0B1120] border border-slate-700/50 rounded-lg px-4 py-2.5 text-emerald-400 font-bold outline-none focus:border-accent/50 transition-colors" placeholder="0.00">
                                </div>
                            </div>
                        </div>

                        <div>
                            <h4 class="text-xs text-slate-500 uppercase font-bold tracking-widest mb-3">3. Datos de Referencia</h4>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-semibold text-slate-300 mb-1">Hoja de Ruta</label>
                                    <input type="text" id="asientos_hoja_ruta" class="w-full bg-[#0B1120] border border-slate-700/50 rounded-lg px-4 py-2.5 text-slate-200 outline-none focus:border-accent/50 transition-colors">
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-slate-300 mb-1">N° Libro Reg.</label>
                                    <input type="text" id="asientos_n_libro_registro" class="w-full bg-[#0B1120] border border-slate-700/50 rounded-lg px-4 py-2.5 text-slate-200 outline-none focus:border-accent/50 transition-colors">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div class="bg-[#111827] p-5 rounded-xl border border-slate-800/50 h-full flex flex-col shadow-inner">
                            <h4 class="text-xs text-accent font-bold tracking-widest mb-5">4. ARCHIVO DIGITAL Y FÍSICO</h4>

                            <div class="mb-5">
                                <label class="block text-xs font-semibold text-slate-300 mb-2 flex items-center gap-2">
                                    <i class="fas fa-box-open text-slate-500"></i> Ubicación Física
                                </label>
                                <input type="text" id="asientos_ubicacion_fisica" class="w-full bg-[#0B1120] border border-slate-700/50 rounded-lg px-4 py-2.5 text-slate-200 outline-none focus:border-accent/50 transition-colors" placeholder="Ej: Estante 2 / Caja 15">
                            </div>

                            <div class="flex-1 flex flex-col min-h-[150px]">
                                <label class="block text-xs font-semibold text-slate-300 mb-2 flex items-center gap-2">
                                    <i class="fas fa-file-pdf text-slate-500"></i> Ruta de Archivo
                                </label>

                                <div id="contenedor-esperando-pdf-asientos" class="flex-1 border-2 border-dashed border-slate-600/50 rounded-xl p-4 flex flex-col items-center justify-center hover:border-accent/50 hover:bg-accent/5 transition-all cursor-pointer bg-[#0B1120]/50 relative overflow-hidden group">
                                    <div class="w-12 h-12 bg-slate-700/50 rounded-full flex items-center justify-center mb-3 group-hover:bg-accent/20 transition-colors">
                                        <i class="fas fa-cloud-upload-alt text-xl text-slate-300 group-hover:text-accent"></i>
                                    </div>
                                    <p class="text-xs text-white font-semibold mb-1">Arrastra el escaneo PDF</p>
                                    <p class="text-[10px] text-slate-500">Máximo 50MB</p>
                                    <div class="flex gap-2 mt-3 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                        <button type="button" class="bg-blue-600/20 text-blue-400 border border-blue-500/30 px-2 py-1 rounded text-[10px] font-bold hover:bg-blue-600 hover:text-white transition-colors relative z-20">Importar</button>
                                    </div>
                                    <input type="file" id="ruta_archivo_asientos" accept="application/pdf" onchange="archivoImportadoManualmenteAsientos(this)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-30">
                                </div>

                                <div id="contenedor-pdf-listo-asientos" class="hidden flex-1 border-2 border-emerald-500/50 rounded-xl p-4 flex flex-col items-center justify-center bg-emerald-900/10 relative overflow-hidden group transition-all shadow-[0_0_15px_rgba(16,185,129,0.1)]">
                                    <button type="button" onclick="cancelarArchivoAsientos(event)" class="absolute top-2 right-2 w-7 h-7 bg-red-500/20 text-red-400 hover:bg-red-500 hover:text-white rounded-full flex items-center justify-center transition-colors z-30 shadow-lg">
                                        <i class="fas fa-times text-xs"></i>
                                    </button>
                                    <div onclick="previsualizarPdfTemporalAsientos()" class="cursor-pointer flex flex-col items-center justify-center w-full h-full z-20">
                                        <div class="w-16 h-16 bg-red-500/20 rounded-2xl flex items-center justify-center mb-3 group-hover:scale-110 transition-transform shadow-[0_0_15px_rgba(239,68,68,0.3)] border border-red-500/30">
                                            <i class="fas fa-file-pdf text-4xl text-red-400"></i>
                                        </div>
                                        <p class="text-xs text-emerald-400 font-bold mb-1 text-center">
                                            <i class="fas fa-check-circle mr-1"></i> Documento Listo
                                        </p>
                                        <p id="nombre-pdf-listo-asientos" class="text-[10px] text-slate-400 text-center group-hover:text-white transition-colors">Clic para previsualizar</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div class="bg-[#0B1120] p-5 rounded-xl border border-slate-700/50 h-full flex flex-col relative overflow-hidden">
                            <h4 class="text-xs text-slate-400 uppercase font-bold tracking-widest mb-5 border-b border-slate-800 pb-2">
                                <i class="fas fa-server text-accent mr-1"></i> Servidor Hardware
                            </h4>

                            <div class="bg-[#151C2C] border border-slate-700/50 rounded-xl p-4 mb-4 relative overflow-hidden">
                                <div id="status-luz-asientos" class="absolute top-0 right-0 w-16 h-16 bg-red-500/20 rounded-bl-full blur-xl transition-colors duration-500"></div>
                                <div class="flex flex-col items-center justify-center relative z-10 text-center mb-3">
                                    <div id="status-icono-bg-asientos" class="w-12 h-12 rounded-full bg-slate-800 flex items-center justify-center text-slate-400 border border-slate-700 transition-colors duration-500 mb-2 shadow-inner">
                                        <i id="status-icono-asientos" class="fas fa-print text-lg"></i>
                                    </div>
                                    <p id="status-nombre-escaner-asientos" class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Buscando dispositivo...</p>
                                    <p id="status-texto-asientos" class="text-sm font-bold text-red-400 mt-1">Desconectado</p>
                                </div>
                                <button type="button" onclick="verificarConexionHardwareAsientos()" id="btn-comprobar-hardware-asientos" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold py-2 rounded-lg transition-colors border border-slate-700 flex items-center justify-center gap-2">
                                    <i class="fas fa-sync-alt"></i> Comprobar
                                </button>
                            </div>

                            <div class="mt-auto flex flex-col gap-2">
                                <button type="button" id="btn-escanear-asientos" onclick="escanearDocumentoEpsonAsientos(event)" class="w-full bg-emerald-600/20 text-emerald-400 border border-emerald-500/30 py-3 rounded-lg text-xs font-bold hover:bg-emerald-600 hover:text-white transition-all shadow-[0_0_10px_rgba(16,185,129,0.1)] flex items-center justify-center gap-2">
                                    <i class="fas fa-satellite-dish"></i> Activar Escáner
                                </button>
                                <p id="lbl-estado-escaner-asientos" class="text-[10px] text-emerald-400 font-bold text-center hidden bg-emerald-500/10 py-1.5 rounded border border-emerald-500/20">
                                    <i class="fas fa-check-circle mr-1"></i> En memoria
                                </p>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <div class="p-4 border-t border-slate-700/50 bg-[#0B1120] flex justify-end gap-4 flex-shrink-0">
                <button type="button" onclick="cerrarModalAsientosManuales()" class="px-6 py-2 rounded-lg text-slate-400 font-bold hover:text-slate-200 transition-colors text-sm">
                    Cancelar
                </button>
                <button type="button" onclick="guardarRegistroAsientos()" class="bg-accent hover:bg-accenthover text-white px-8 py-2 rounded-lg font-bold transition-all shadow-[0_0_15px_rgba(168,85,247,0.4)] text-sm">
                    Guardar Asiento Manual
                </button>
            </div>
        </form>
    </div>
</div>
