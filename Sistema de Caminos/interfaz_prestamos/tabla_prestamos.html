<section class="seccion h-[calc(100vh-160px)] flex flex-col min-h-0">
    <div class="w-full flex flex-col bg-darkcard rounded-2xl border border-slate-800/50 overflow-hidden h-full shadow-lg min-h-0">
        
        <div class="p-4 border-b border-slate-800 bg-[#151C2C] flex justify-between items-center flex-shrink-0">
            <div class="flex items-center gap-4">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Control de Préstamos Físicos</span>
                
                <div class="bg-[#0B1120] rounded-lg p-1 border border-slate-700 flex gap-1">
                    <button onclick="filtrarPrestamos('todos', this)" class="filtro-btn activo bg-slate-700 text-white px-3 py-1.5 rounded text-[10px] font-bold transition-colors">Todos</button>
                    <button onclick="filtrarPrestamos('pendiente', this)" class="filtro-btn text-slate-400 hover:text-white px-3 py-1.5 rounded text-[10px] font-bold transition-colors">Pendientes</button>
                    <button onclick="filtrarPrestamos('devuelto', this)" class="filtro-btn text-slate-400 hover:text-white px-3 py-1.5 rounded text-[10px] font-bold transition-colors">Devueltos</button>
                </div>
            </div>

            <button onclick="abrirModalBusquedaPrestamo()" class="bg-accent hover:bg-accenthover text-white px-5 py-2 rounded-lg text-xs font-bold transition-all shadow-[0_0_10px_rgba(168,85,247,0.3)]">
                <i class="fas fa-hand-holding mr-2"></i> Nuevo Préstamo
            </button>
        </div>

        <div class="flex-1 overflow-x-auto overflow-y-auto scroll-custom relative min-h-0">
            <table class="w-full text-left text-xs whitespace-nowrap min-w-full">
                <thead class="bg-[#0B1120] text-[10px] uppercase font-bold text-slate-500 tracking-wider sticky top-0 z-10 shadow-sm">
                    <tr>
                        <th class="p-4 border-b border-slate-800">Cód</th>
                        <th class="p-4 border-b border-slate-800 text-center">Estado</th>
                        <th class="p-4 border-b border-slate-800">F. Préstamo</th>
                        <th class="p-4 border-b border-slate-800">Solicitante (Unidad)</th>
                        <th class="p-4 border-b border-slate-800">Documento Solicitado</th>
                        <th class="p-4 border-b border-slate-800 w-48">Motivo / Glosa</th>
                        <th class="p-4 border-b border-slate-800 text-red-400">F. Límite</th>
                        <th class="p-4 border-b border-slate-800 text-emerald-400">F. Devolución</th>
                        <th class="p-4 border-b border-slate-800 text-center sticky right-0 bg-[#0B1120] shadow-[-5px_0_10px_rgba(0,0,0,0.2)]">Acción</th>
                    </tr>
                </thead>
                <tbody id="body-tabla-prestamos" class="divide-y divide-slate-800/50 text-slate-300">
                </tbody>
            </table>
        </div>
    </div>
</section>
