<section class="seccion h-full flex-col relative">
    <div class="w-full flex flex-col bg-darkcard rounded-2xl border border-slate-800/50 overflow-hidden h-full shadow-lg">
        
        <div class="p-4 border-b border-slate-800 bg-[#151C2C] flex justify-between items-center flex-shrink-0">
            <div>
                <h2 class="text-lg font-bold text-white"><i class="fas fa-shield-alt text-accent mr-2"></i> Configuración de Roles y Permisos</h2>
                <p class="text-xs text-slate-400 mt-1">Administra los niveles de acceso al Sistema Caminos.</p>
            </div>
            <button onclick="abrirModalRol()" class="bg-accent hover:bg-accenthover text-white px-5 py-2 rounded-lg text-xs font-bold transition-all shadow-[0_0_10px_rgba(168,85,247,0.3)] flex items-center gap-2">
                <i class="fas fa-plus"></i> Nuevo Rol
            </button>
        </div>

        <div class="flex-1 overflow-x-auto overflow-y-auto scroll-custom">
            <table class="w-full text-left text-xs whitespace-nowrap min-w-full">
                <thead class="bg-[#0B1120] text-[10px] uppercase font-bold text-slate-500 tracking-wider sticky top-0 z-10 shadow-sm">
                    <tr>
                        <th class="p-4 border-b border-slate-800 w-16">ID</th>
                        <th class="p-4 border-b border-slate-800 w-48">Rol</th>
                        <th class="p-4 border-b border-slate-800 text-center" title="Leer Registros">Leer</th>
                        <th class="p-4 border-b border-slate-800 text-center" title="Crear Registros">Crear</th>
                        <th class="p-4 border-b border-slate-800 text-center" title="Editar Registros">Editar</th>
                        <th class="p-4 border-b border-slate-800 text-center" title="Eliminar Registros">Eliminar</th>
                        <th class="p-4 border-b border-slate-800 text-center" title="Manejar PDFs">PDF</th>
                        <th class="p-4 border-b border-slate-800 text-center" title="Préstamo de Documentos">Prestar</th>
                        <th class="p-4 border-b border-slate-800 text-center text-emerald-500" title="Administrar Usuarios">Adm.Usr</th>
                        <th class="p-4 border-b border-slate-800 text-center text-emerald-500" title="Administrar Gestiones">Adm.Gest</th>
                        <th class="p-4 border-b border-slate-800 text-center sticky right-0 bg-[#0B1120] shadow-[-5px_0_10px_rgba(0,0,0,0.2)]">Acción</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla-roles" class="divide-y divide-slate-800/50 text-slate-300">
                </tbody>
            </table>
        </div>
    </div>

    <div id="modalRol" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4 transition-opacity">
        <div class="bg-[#151C2C] w-full max-w-2xl rounded-2xl border border-slate-700 flex flex-col shadow-2xl transform scale-95 opacity-0 transition-all duration-300" id="modalRolContent">
            
            <div class="flex justify-between items-center p-6 border-b border-slate-700/50 bg-[#0B1120]">
                <h3 id="tituloModalRol" class="text-white font-bold text-lg flex items-center gap-3">
                    <i class="fas fa-shield-alt text-accent"></i> Crear Nuevo Rol
                </h3>
                <button onclick="cerrarModalRol()" class="text-slate-400 hover:text-white transition-colors w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <form onsubmit="event.preventDefault(); guardarRolBD();" class="flex flex-col max-h-full">
                <div class="p-6 overflow-y-auto max-h-[70vh] scroll-custom">
                    
                    <input type="hidden" id="rol_id_oculto" value="">
                    
                    <div class="mb-4">
                        <label class="block text-xs font-semibold text-slate-300 mb-1">Nombre del Rol</label>
                        <input type="text" id="rol_nombre" required class="w-full bg-[#0B1120] border border-slate-700/50 rounded-lg px-4 py-2.5 text-white outline-none focus:border-blue-500" placeholder="Ej: Secretaria">
                    </div>

                    <div class="mb-6">
                        <label class="block text-xs font-semibold text-slate-300 mb-1">Descripción</label>
                        <input type="text" id="rol_descripcion" class="w-full bg-[#0B1120] border border-slate-700/50 rounded-lg px-4 py-2.5 text-white outline-none focus:border-blue-500 text-sm" placeholder="Breve descripción del cargo">
                    </div>

                    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 border-b border-slate-700/50 pb-2">Permisos Básicos</h4>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
                        <label class="flex items-center gap-3 p-3 rounded-xl border border-slate-700/50 bg-[#0B1120]/50 cursor-pointer hover:border-blue-500/50 transition-colors">
                            <input type="checkbox" id="rol_p_leer" class="w-4 h-4 accent-blue-500 rounded bg-slate-800 border-slate-600 cursor-pointer">
                            <span class="text-sm font-bold text-white">Leer</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 rounded-xl border border-slate-700/50 bg-[#0B1120]/50 cursor-pointer hover:border-blue-500/50 transition-colors">
                            <input type="checkbox" id="rol_p_crear" class="w-4 h-4 accent-blue-500 rounded bg-slate-800 border-slate-600 cursor-pointer">
                            <span class="text-sm font-bold text-white">Crear</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 rounded-xl border border-slate-700/50 bg-[#0B1120]/50 cursor-pointer hover:border-blue-500/50 transition-colors">
                            <input type="checkbox" id="rol_p_editar" class="w-4 h-4 accent-blue-500 rounded bg-slate-800 border-slate-600 cursor-pointer">
                            <span class="text-sm font-bold text-white">Editar</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 rounded-xl border border-slate-700/50 bg-[#0B1120]/50 cursor-pointer hover:border-blue-500/50 transition-colors">
                            <input type="checkbox" id="rol_p_eliminar" class="w-4 h-4 accent-red-500 rounded bg-slate-800 border-slate-600 cursor-pointer">
                            <span class="text-sm font-bold text-red-400">Eliminar</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 rounded-xl border border-slate-700/50 bg-[#0B1120]/50 cursor-pointer hover:border-blue-500/50 transition-colors">
                            <input type="checkbox" id="rol_p_pdf" class="w-4 h-4 accent-blue-500 rounded bg-slate-800 border-slate-600 cursor-pointer">
                            <span class="text-sm font-bold text-white">Manejar PDFs</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 rounded-xl border border-slate-700/50 bg-[#0B1120]/50 cursor-pointer hover:border-blue-500/50 transition-colors">
                            <input type="checkbox" id="rol_p_prestar" class="w-4 h-4 accent-blue-500 rounded bg-slate-800 border-slate-600 cursor-pointer">
                            <span class="text-sm font-bold text-white">Prestar Docs</span>
                        </label>
                    </div>

                    <h4 class="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-4 border-b border-slate-700/50 pb-2">Permisos de Administrador</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <label class="flex items-center gap-3 p-3 rounded-xl border border-emerald-900/30 bg-emerald-900/10 cursor-pointer hover:border-emerald-500/50 transition-colors">
                            <input type="checkbox" id="rol_p_admin_usr" class="w-4 h-4 accent-emerald-500 rounded bg-slate-800 border-slate-600 cursor-pointer">
                            <span class="text-sm font-bold text-emerald-400">Admin. Usuarios</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 rounded-xl border border-emerald-900/30 bg-emerald-900/10 cursor-pointer hover:border-emerald-500/50 transition-colors">
                            <input type="checkbox" id="rol_p_admin_gest" class="w-4 h-4 accent-emerald-500 rounded bg-slate-800 border-slate-600 cursor-pointer">
                            <span class="text-sm font-bold text-emerald-400">Admin. Gestiones</span>
                        </label>
                    </div>

                </div>

                <div class="p-4 border-t border-slate-700/50 bg-[#0B1120] flex justify-end gap-3 rounded-b-2xl">
                    <button type="button" onclick="cerrarModalRol()" class="px-4 py-2 rounded-lg text-slate-400 font-bold hover:text-slate-200 transition-colors text-sm">Cancelar</button>
                    <button type="submit" id="btnGuardarRol" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg font-bold transition-all shadow-[0_0_15px_rgba(59,130,246,0.4)] text-sm flex items-center gap-2">
                        <i class="fas fa-save"></i> Guardar Rol
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
