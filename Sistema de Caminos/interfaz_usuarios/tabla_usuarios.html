<section class="seccion h-full flex-col">

            <div class="flex gap-3">
                <button onclick="abrirModalUsuario()" class="bg-accent hover:bg-accenthover text-white px-5 py-2 rounded-lg text-xs font-bold transition-all shadow-[0_0_10px_rgba(168,85,247,0.3)]">

        </div>

        <div class="flex-1 overflow-x-auto overflow-y-auto scroll-custom relative">

                </thead>
